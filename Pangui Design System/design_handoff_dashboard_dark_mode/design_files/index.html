<!doctype html>
<html lang="es" data-theme="auto">
<head>
<meta charset="utf-8">
<title>Pangui · App UI Kit v2 — Dark mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="app.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
// Read theme before paint to avoid flash
(function(){
  try {
    var t = localStorage.getItem("pg2_theme") || "auto";
    document.documentElement.setAttribute("data-theme", t);
  } catch(e) {}
})();
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="Inicio.jsx"></script>
<script type="text/babel" src="Ordenes.jsx"></script>
<script type="text/babel" src="PartesEquipoConfigNotifs.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useLayoutEffect } = React;

function App() {
  const [nav, setNav] = useState("inicio");
  const [theme, setTheme] = useTheme();

  // Re-render lucide icons after every React commit
  useLayoutEffect(() => {
    const id = setTimeout(() => window.lucide && window.lucide.createIcons(), 0);
    return () => clearTimeout(id);
  });

  const screenProps = { theme, onTheme: setTheme };
  return (
    <div className="app">
      <Sidebar active={nav} onNav={setNav}/>
      {nav === "inicio"         && <Inicio          {...screenProps} onGoOrdenes={() => setNav("ordenes")}/>}
      {nav === "ordenes"        && <Ordenes         {...screenProps}/>}
      {nav === "partes"         && <Partes          {...screenProps}/>}
      {nav === "equipo"         && <Equipo          {...screenProps}/>}
      {nav === "configuracion"  && <Configuracion   {...screenProps} onSetTheme={setTheme}/>}
      {nav === "notificaciones" && <Notificaciones  {...screenProps}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body></html>
