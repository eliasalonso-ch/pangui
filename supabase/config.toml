[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_signup = true

[functions.notificar]
verify_jwt = false

[functions.invitar]
verify_jwt = false

# Cron-triggered by pg_cron, which calls them without a JWT. Must allow
# unauthenticated invocation (they use the service-role key internally and
# are not user-facing). Without this they 401 before the handler runs, so the
# Sentry cron check-in never fires.
[functions.evaluar-alertas]
verify_jwt = false

[functions.export-schedules-cron]
verify_jwt = false

# Invoked by the notifications database webhook, not by an end-user session.
# The handler validates the notification against the authoritative database row.
[functions.send-push-notification]
verify_jwt = false
